# Development Docker Compose with hot-reload
version: '3.8'

services:
  # api-gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
      target: builder
    container_name: api-gateway-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - ./api-gateway/.env
    volumes:
      - ./api-gateway/src:/app/api-gateway/src
      - ./api-gateway/dist:/app/api-gateway/dist
      - ./common:/app/common
    command: npm run dev
    networks:
      - microservices-network
    depends_on:
      - auth-service
      - user-service
      - student-service
      - violation-service
      - achievement-service
      - category-service
      - notification-service
      - reporting-service
      - counseling-service
      - schedule-service

  # auth-service
  auth-service:
